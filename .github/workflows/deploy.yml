name: Deploy Frontend

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/whatsapp-frontend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run tests
        run: npm run test:ci

  deploy-dev:
    needs: test
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:v${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS (dev)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            docker compose pull
            docker compose up -d

      - name: Discord notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          COLOR=$(( STATUS == 'success' && echo 3066993 || echo 15158332 ))
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Frontend Deploy (Dev)\",\"description\":\"Status: **${STATUS}**\nRun: ${{ github.run_number }}\nCommit: ${{ github.sha }}\",\"color\":${COLOR}}]}" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

  deploy-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Deploy to VPS (prod)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            docker pull ${{ env.IMAGE_NAME }}:v${{ github.run_number }}
            docker tag ${{ env.IMAGE_NAME }}:v${{ github.run_number }} ${{ env.IMAGE_NAME }}:prod
            docker compose -f docker-compose.prod.yml up -d

      - name: Discord notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          COLOR=$(( STATUS == 'success' && echo 3066993 || echo 15158332 ))
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Frontend Deploy (Prod)\",\"description\":\"Status: **${STATUS}**\nTag: v${{ github.run_number }}\nCommit: ${{ github.sha }}\",\"color\":${COLOR}}]}" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
